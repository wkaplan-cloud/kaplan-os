<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kaplan">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1B3A5C">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Kaplan OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:   { 50:'#EEF3F8', 100:'#D5E3EF', 300:'#7FAFD6', 500:'#3B6EA5', 600:'#2D5986', 700:'#1B3A5C', 900:'#0D1E30' },
            coral:  { 400:'#F0946E', 500:'#E8714A', 600:'#D55A30' },
            warm:   { 50:'#FAFAF8', 100:'#F5F3EF', 200:'#EDE9E3', 300:'#E0DCD5' }
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:    ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      margin: 0; padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #F5F3EF;
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: #F5F3EF;
    }

    /* ── Header ───────────────────────────────────── */
    .hdr {
      background: linear-gradient(135deg, #2D5986 0%, #1B3A5C 100%);
      padding: calc(env(safe-area-inset-top, 0px) + 18px) 20px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .hdr::before {
      content: '';
      position: absolute;
      top: -60px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hdr-logo { display: flex; align-items: center; gap: 12px; }
    .hdr-icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .hdr-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 21px; font-weight: 700;
      color: white; letter-spacing: -0.025em; line-height: 1;
    }
    .hdr-sub { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 3px; letter-spacing: 0.03em; }

    .inbox-btn {
      position: relative;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; color: white;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .inbox-btn:active { background: rgba(255,255,255,0.22); transform: scale(0.94); }

    .badge {
      position: absolute; top: -5px; right: -5px;
      background: #E8714A; color: white;
      font-size: 10px; font-weight: 700;
      min-width: 19px; height: 19px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
      border: 2px solid #1B3A5C;
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── Messages area ────────────────────────────── */
    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .msgs::-webkit-scrollbar { display: none; }

    /* ── Welcome card ─────────────────────────────── */
    .welcome {
      background: white;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 2px 18px rgba(27,58,92,0.08), 0 1px 4px rgba(27,58,92,0.06);
      animation: slideUp 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .welcome-icon {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, #2D5986, #1B3A5C);
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(27,58,92,0.28);
    }
    .welcome-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 19px; font-weight: 700;
      color: #1B3A5C; letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .welcome-body { font-size: 14px; color: #6B7280; line-height: 1.65; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
    .chip {
      background: #F5F3EF;
      border: 1.5px solid #E0DCD5;
      border-radius: 20px;
      padding: 7px 15px;
      font-size: 13px; font-weight: 500;
      color: #2D5986; cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    .chip:active { background: #EEF3F8; transform: scale(0.96); }

    /* ── Message bubbles ──────────────────────────── */
    .msg {
      display: flex; gap: 10px;
      animation: slideUp 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #2D5986, #1B3A5C);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 2px 8px rgba(27,58,92,0.22);
      align-self: flex-end;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 15px; line-height: 1.55;
    }
    .msg.ai .bubble {
      background: white; color: #1A1A1A;
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 14px rgba(27,58,92,0.07), 0 1px 3px rgba(27,58,92,0.05);
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #3B6EA5, #1B3A5C);
      color: white; border-bottom-right-radius: 5px;
      box-shadow: 0 2px 14px rgba(27,58,92,0.25);
    }

    /* ── Unknown / ask parent card ────────────────── */
    .unknown-card {
      background: white;
      border-radius: 20px; border-bottom-left-radius: 5px;
      padding: 16px 18px;
      max-width: 86%;
      box-shadow: 0 2px 14px rgba(27,58,92,0.07);
    }
    .unknown-text { font-size: 15px; color: #374151; line-height: 1.55; margin-bottom: 14px; }
    .unknown-actions { display: flex; gap: 8px; }

    .btn-coral {
      background: linear-gradient(135deg, #E8714A, #D55A30);
      color: white; border: none;
      border-radius: 11px; padding: 9px 18px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(232,113,74,0.35);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn-coral:active { transform: scale(0.95); opacity: 0.88; }

    .btn-ghost {
      background: #F5F3EF; color: #6B7280;
      border: none; border-radius: 11px; padding: 9px 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .btn-ghost:active { transform: scale(0.95); background: #EDE9E3; }

    /* ── Typing indicator ─────────────────────────── */
    .typing-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      animation: slideUp 0.18s ease;
    }
    .typing-bub {
      background: white;
      padding: 13px 16px; border-radius: 20px; border-bottom-left-radius: 5px;
      box-shadow: 0 2px 14px rgba(27,58,92,0.07);
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #9CA3AF;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Status bubbles ───────────────────────────── */
    .bubble-ok {
      background: #ECFDF5; border: 1.5px solid #6EE7B7; color: #065F46;
      padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 5px;
      font-size: 14px; line-height: 1.55; max-width: 86%;
      animation: slideUp 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .bubble-err {
      background: #FEF2F2; border: 1.5px solid #FECACA; color: #991B1B;
      padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 5px;
      font-size: 14px; line-height: 1.55; max-width: 86%;
    }

    /* ── Input area ───────────────────────────────── */
    .input-wrap {
      padding: 12px 14px calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: white;
      border-top: 1px solid #EDE9E3;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
      box-shadow: 0 -4px 24px rgba(27,58,92,0.06);
    }
    .msg-input {
      flex: 1;
      background: #F5F3EF;
      border: 1.5px solid #E0DCD5;
      border-radius: 16px;
      padding: 11px 16px;
      font-size: 15px; font-family: 'Inter', sans-serif;
      color: #1A1A1A; outline: none;
      resize: none; max-height: 120px; line-height: 1.45;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .msg-input:focus {
      border-color: #3B6EA5;
      box-shadow: 0 0 0 3px rgba(59,110,165,0.12);
    }
    .msg-input::placeholder { color: #BAB5AE; }

    .send-btn {
      width: 43px; height: 43px; flex-shrink: 0;
      background: linear-gradient(135deg, #3B6EA5, #1B3A5C);
      border: none; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(27,58,92,0.3);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .send-btn:active { transform: scale(0.93); opacity: 0.88; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">🏠</div>
      <div>
        <div class="hdr-title">Kaplan OS</div>
        <div class="hdr-sub">Family Assistant</div>
      </div>
    </div>
    <button class="inbox-btn" onclick="logout()" title="Log out" style="margin-right:6px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
    <a href="/parent.html" class="inbox-btn" id="inboxBtn" title="Parent Inbox">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="badge" id="badge" style="display:none"></span>
    </a>
  </header>

  <!-- Messages -->
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🏠</div>
      <div class="welcome-title">Hi, I'm Kaplan OS</div>
      <div class="welcome-body">Your family's private knowledge assistant. Ask me anything — birthdays, phone numbers, documents, passwords, and more.</div>
      <div class="chips">
        <button class="chip" onclick="suggest(this)">WiFi password?</button>
        <button class="chip" onclick="suggest(this)">When is Mom's birthday?</button>
        <button class="chip" onclick="suggest(this)">Dad's phone number?</button>
        <button class="chip" onclick="suggest(this)">Where are the passports?</button>
        <button class="chip" onclick="suggest(this)">Emergency contacts?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-wrap">
    <textarea
      class="msg-input" id="input"
      placeholder="Ask anything about the family…"
      rows="1" autocomplete="off" autocorrect="off" spellcheck="false"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const msgs    = document.getElementById('msgs')
  const input   = document.getElementById('input')
  const sendBtn = document.getElementById('sendBtn')
  const welcome = document.getElementById('welcome')
  const badge   = document.getElementById('badge')

  // Auto-resize textarea
  input.addEventListener('input', function () {
    this.style.height = 'auto'
    this.style.height = Math.min(this.scrollHeight, 120) + 'px'
  })

  // Send on Enter
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
  })

  function suggest(btn) { input.value = btn.textContent; input.focus() }

  function scrollBottom() {
    requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight })
  }

  function esc(str) {
    const d = document.createElement('div')
    d.textContent = str
    return d.innerHTML
  }

  function addUser(text) {
    welcome.style.display = 'none'
    msgs.insertAdjacentHTML('beforeend', `
      <div class="msg user">
        <div class="bubble">${esc(text)}</div>
      </div>`)
    scrollBottom()
  }

  function addAi(text) {
    msgs.insertAdjacentHTML('beforeend', `
      <div class="msg ai">
        <div class="avatar">🏠</div>
        <div class="bubble">${esc(text)}</div>
      </div>`)
    scrollBottom()
  }

  function showTyping() {
    msgs.insertAdjacentHTML('beforeend', `
      <div class="typing-wrap" id="typing">
        <div class="avatar">🏠</div>
        <div class="typing-bub">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`)
    scrollBottom()
  }

  function hideTyping() {
    const el = document.getElementById('typing')
    if (el) el.remove()
  }

  function showUnknown(question) {
    msgs.insertAdjacentHTML('beforeend', `
      <div class="msg ai" id="unknownMsg">
        <div class="avatar">🏠</div>
        <div class="unknown-card">
          <div class="unknown-text">I don't have this information yet. Would you like to send this to a parent to answer?</div>
          <div class="unknown-actions">
            <button class="btn-coral" onclick="askParent()">Ask a parent</button>
            <button class="btn-ghost" onclick="dismissUnknown()">No thanks</button>
          </div>
        </div>
      </div>`)
    scrollBottom()
    window._pendingQ = question
  }

  function showOk(text) {
    msgs.insertAdjacentHTML('beforeend', `
      <div class="msg ai">
        <div class="avatar">🏠</div>
        <div class="bubble-ok">${esc(text)}</div>
      </div>`)
    scrollBottom()
  }

  function showErr(text) {
    msgs.insertAdjacentHTML('beforeend', `
      <div class="msg ai">
        <div class="avatar">🏠</div>
        <div class="bubble-err">${esc(text)}</div>
      </div>`)
    scrollBottom()
  }

  async function askParent() {
    const q = window._pendingQ
    document.getElementById('unknownMsg')?.remove()
    try {
      await fetch('/api/pending', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      })
      showOk('✓ Sent to parent inbox! You will get an answer soon.')
      loadBadge()
    } catch {
      showErr('Something went wrong. Please try again.')
    }
  }

  function dismissUnknown() {
    document.getElementById('unknownMsg')?.remove()
    addAi('No problem! Ask me anything else.')
  }

  async function loadBadge() {
    try {
      const { count } = await (await fetch('/api/pending/count')).json()
      if (count > 0) {
        badge.textContent = count
        badge.style.display = 'flex'
      } else {
        badge.style.display = 'none'
      }
    } catch {}
  }

  async function send() {
    const text = input.value.trim()
    if (!text) return

    input.value = ''
    input.style.height = 'auto'
    sendBtn.disabled = true
    addUser(text)
    showTyping()

    try {
      const res  = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      })
      const data = await res.json()
      hideTyping()

      if (data.error) {
        showErr(data.message || 'Something went wrong.')
      } else if (data.unknown) {
        showUnknown(text)
      } else {
        addAi(data.answer)
      }
    } catch {
      hideTyping()
      showErr('Connection error. Is the server running?')
    } finally {
      sendBtn.disabled = false
      input.focus()
    }
  }

  async function logout () {
    await fetch('/api/logout', { method: 'POST' })
    window.location.href = '/login.html'
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }

  // Hide parent inbox button for non-parents
  fetch('/api/me').then(r => r.json()).then(me => {
    if (me.role !== 'parent') {
      document.getElementById('inboxBtn').style.display = 'none'
    }
  }).catch(() => {})

  loadBadge()
  input.focus()
</script>
</body>
</html>
