[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ── Volume setup (do this in Railway dashboard) ──────────────────────────────
# 1. Go to your service → Storage → Add Volume
# 2. Mount path: /app/data
# 3. Then add these environment variables in Railway dashboard:
#    DB_PATH = /app/data/kaplan.db
#    OPENAI_API_KEY = sk-...
#    FAMILY_PASSWORD = your-family-password
#    PARENT_PASSWORD = your-parent-password
#    SESSION_SECRET = some-long-random-string
# ─────────────────────────────────────────────────────────────────────────────
